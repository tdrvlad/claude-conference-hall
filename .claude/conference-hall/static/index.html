<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Conference Hall</title>
<style>
  :root {
    --bg:        #0e1116;
    --bg-soft:   #161b22;
    --bg-card:   #1a212b;
    --border:    #2a3240;
    --border-lo: #222a35;
    --fg:        #e6edf3;
    --fg-dim:    #8b97a6;
    --fg-faint:  #5c6675;
    --accent:    #4493f8;

    --t-decision: #f8616b;
    --t-result:   #3fb950;
    --t-spawn:    #2bd4d4;
    --t-handoff:  #b083f0;
    --t-todo:     #e3b341;
    --t-status:   #4493f8;
    --t-note:     #8b97a6;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--fg);
    font: 14px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  header {
    flex: 0 0 auto;
    padding: 14px 20px 0;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, var(--bg-soft), var(--bg));
  }
  .titlebar {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 12px;
  }
  .title { font-size: 16px; font-weight: 650; letter-spacing: .2px; }
  .title .glyph { color: var(--accent); margin-right: 6px; }
  .sub { color: var(--fg-faint); font-size: 12px; }
  .conn {
    margin-left: auto;
    font-size: 11.5px;
    color: var(--fg-faint);
    display: flex; align-items: center; gap: 6px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--t-result); }
  .dot.bad { background: var(--t-decision); }

  /* tabs */
  .tabs { display: flex; gap: 2px; flex-wrap: wrap; }
  .tab {
    appearance: none;
    border: 1px solid transparent;
    border-bottom: none;
    background: none;
    color: var(--fg-dim);
    padding: 8px 14px;
    border-radius: 8px 8px 0 0;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    display: flex; align-items: center; gap: 8px;
    position: relative;
    top: 1px;
  }
  .tab:hover { color: var(--fg); background: var(--bg-soft); }
  .tab.active {
    color: var(--fg);
    background: var(--bg);
    border-color: var(--border);
  }
  .tab .count {
    font-size: 11px;
    color: var(--fg-faint);
    background: var(--bg-card);
    border-radius: 10px;
    padding: 1px 7px;
    min-width: 20px; text-align: center;
  }
  .tab.active .count { color: var(--fg-dim); }
  .tab .decbadge {
    font-size: 11px;
    color: #fff;
    background: var(--t-decision);
    border-radius: 10px;
    padding: 1px 7px;
    font-weight: 600;
  }
  /* nested instance sub-channels (e.g. implementer:bug-A) */
  .tab.sub {
    font-size: 12px;
    padding: 6px 10px 6px 8px;
    margin-left: 6px;
    gap: 6px;
    color: var(--fg-faint);
  }
  .tab.sub::before { content: "└\00a0"; color: var(--fg-faint); }
  .tab.sub.active {
    color: var(--fg);
    background: var(--bg);
    border-color: var(--border);
  }

  /* feed */
  main {
    flex: 1 1 auto;
    overflow-y: auto;
    padding: 18px 20px 40px;
  }
  .feed { max-width: 940px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--border-lo);
    border-left: 3px solid var(--border-lo);
    border-radius: 9px;
    padding: 12px 15px;
    animation: pop .18s ease;
  }
  @keyframes pop { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: none; } }
  .card.pinned { border-left-color: var(--t-todo); }
  .card.pinned.decision { border-left-color: var(--t-decision); box-shadow: 0 0 0 1px rgba(248,97,107,.18); }

  .meta { display: flex; align-items: center; gap: 9px; margin-bottom: 9px; flex-wrap: wrap; }
  .badge {
    font-size: 10.5px; font-weight: 650; letter-spacing: .5px; text-transform: uppercase;
    padding: 2px 8px; border-radius: 5px;
    border: 1px solid currentColor;
  }
  .pin-ind { font-size: 11px; color: var(--t-todo); }
  .pin-ind.decision { color: var(--t-decision); }
  .chan {
    font-size: 11px; color: var(--fg-dim);
    background: var(--bg-soft); border: 1px solid var(--border-lo);
    padding: 1px 8px; border-radius: 5px;
  }
  .ts { margin-left: auto; font-size: 11px; color: var(--fg-faint); white-space: nowrap; }

  .body { font-size: 13.5px; color: var(--fg); overflow-wrap: anywhere; }
  .body > :first-child { margin-top: 0; }
  .body > :last-child { margin-bottom: 0; }
  .body p { margin: .5em 0; }
  .body a { color: var(--accent); }
  .body h1, .body h2, .body h3, .body h4 { margin: .7em 0 .4em; line-height: 1.3; }
  .body ul, .body ol { margin: .5em 0; padding-left: 1.4em; }
  .body table {
    border-collapse: collapse; margin: .6em 0; font-size: 12.5px; width: 100%;
  }
  .body th, .body td {
    border: 1px solid var(--border); padding: 5px 9px; text-align: left;
  }
  .body th { background: var(--bg-soft); font-weight: 600; }
  .body tr:nth-child(even) td { background: rgba(255,255,255,.015); }
  .body pre {
    background: #0c0f14; border: 1px solid var(--border-lo); border-radius: 7px;
    padding: 11px 13px; overflow-x: auto; font-size: 12.5px;
    font-family: "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace; line-height: 1.45;
  }
  .body code {
    font-family: "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    font-size: 12.5px;
  }
  .body :not(pre) > code {
    background: var(--bg-soft); border: 1px solid var(--border-lo);
    padding: 1px 5px; border-radius: 4px;
  }
  .body svg { max-width: 100%; height: auto; }
  .body blockquote {
    margin: .5em 0; padding-left: 12px; border-left: 3px solid var(--border);
    color: var(--fg-dim);
  }

  /* checklist — visual, Manager-controlled todo checkboxes.
     <ul class="checklist"><li> = ☐, <li class="done"> = green ☑ */
  .body ul.checklist {
    list-style: none; padding-left: 2px; margin: .5em 0;
  }
  .body ul.checklist li {
    position: relative; padding-left: 26px; margin: .3em 0; line-height: 1.5;
  }
  .body ul.checklist li::before {
    content: ""; position: absolute; left: 0; top: .2em;
    width: 15px; height: 15px; box-sizing: border-box;
    border: 1.5px solid var(--fg-faint); border-radius: 4px;
  }
  .body ul.checklist li.done { color: var(--fg-dim); }
  .body ul.checklist li.done::before {
    border-color: var(--t-result); background: var(--t-result);
  }
  .body ul.checklist li.done::after {
    content: ""; position: absolute; left: 5px; top: .27em;
    width: 4px; height: 8px; transform: rotate(45deg);
    border: solid var(--bg); border-width: 0 2px 2px 0;
  }
  /* defensive: GitHub-style task lists (<input type=checkbox>) still look right */
  .body input[type="checkbox"] {
    accent-color: var(--t-result); margin-right: 7px; vertical-align: -1px;
  }
  .body li:has(> input[type="checkbox"]) { list-style: none; margin-left: -1.1em; }

  .empty, .down {
    max-width: 940px; margin: 40px auto; text-align: center; color: var(--fg-faint);
  }
  .down { color: var(--t-decision); }
  .down code {
    color: var(--fg); background: var(--bg-soft); padding: 2px 7px;
    border-radius: 5px; border: 1px solid var(--border-lo);
    font-family: "SF Mono", Menlo, monospace;
  }

  main::-webkit-scrollbar { width: 11px; }
  main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; border: 3px solid var(--bg); }
</style>
</head>
<body>
  <header>
    <div class="titlebar">
      <span class="title"><span class="glyph">◆</span>Conference Hall</span>
      <span class="sub">manager &amp; subagent activity</span>
      <span class="conn"><span id="dot" class="dot"></span><span id="conn-txt">connecting…</span></span>
    </div>
    <div class="tabs" id="tabs"></div>
  </header>
  <main>
    <div class="feed" id="feed"></div>
  </main>

<script>
"use strict";

const POLL_MS = 2500;
const TYPE_COLORS = {
  decision: "var(--t-decision)", result: "var(--t-result)", spawn: "var(--t-spawn)",
  handoff: "var(--t-handoff)", todo: "var(--t-todo)", status: "var(--t-status)",
  note: "var(--t-note)",
};

let active = localStorage.getItem("ch.active") || "__all__";
let lastSig = "";   // for flicker-free re-render
let online = false;

function setActive(ch) {
  active = ch;
  localStorage.setItem("ch.active", ch);
  lastSig = "";        // force feed re-render on tab switch
  refresh();
}

function fmtTime(epoch) {
  const d = new Date(epoch * 1000);
  const now = new Date();
  const sameDay = d.toDateString() === now.toDateString();
  const t = d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  return sameDay ? t : d.toLocaleDateString([], { month: "short", day: "numeric" }) + " " + t;
}

function setConn(ok) {
  online = ok;
  document.getElementById("dot").className = "dot" + (ok ? "" : " bad");
  document.getElementById("conn-txt").textContent = ok ? "live" : "offline";
}

function makeTab(channel, label, n, decisions, isSub) {
  const tabs = document.getElementById("tabs");
  const btn = document.createElement("button");
  btn.className = "tab" + (isSub ? " sub" : "") + (channel === active ? " active" : "");
  btn.onclick = () => setActive(channel);
  btn.innerHTML =
    `<span>${escapeHtml(label)}</span>` +
    `<span class="count">${n}</span>` +
    (decisions ? `<span class="decbadge">${decisions}</span>` : "");
  tabs.appendChild(btn);
}

function renderTabs(channels) {
  const tabs = document.getElementById("tabs");
  const totalN = channels.reduce((s, c) => s + c.n, 0);
  const totalDec = channels.reduce((s, c) => s + (c.decisions || 0), 0);

  // group channels into families by the part before the first ":" — a name with
  // no ":" is a standalone/parent family; "parent:tag" attaches to family "parent".
  const families = new Map();   // name -> { name, bare: channelObj|null, subs: [] }
  const order = [];
  function fam(name) {
    if (!families.has(name)) { families.set(name, { name, bare: null, subs: [] }); order.push(name); }
    return families.get(name);
  }
  for (const c of channels) {
    const i = c.channel.indexOf(":");
    if (i === -1) fam(c.channel).bare = c;
    else fam(c.channel.slice(0, i)).subs.push(c);
  }

  tabs.innerHTML = "";
  makeTab("__all__", "All", totalN, totalDec, false);

  for (const name of order.sort((a, b) => a.localeCompare(b))) {
    const f = families.get(name);
    if (f.subs.length === 0) {
      // standalone channel — renders exactly as before
      const c = f.bare;
      makeTab(c.channel, c.channel, c.n, c.decisions || 0, false);
    } else {
      // parent family with instance sub-channels
      const subs = f.subs.slice().sort((a, b) => a.channel.localeCompare(b.channel));
      const parentN = f.bare ? f.bare.n : subs.length;
      const parentDec = (f.bare ? (f.bare.decisions || 0) : 0)
        + subs.reduce((s, c) => s + (c.decisions || 0), 0);
      makeTab(f.name, f.name, parentN, parentDec, false);
      for (const c of subs) {
        makeTab(c.channel, c.channel.slice(f.name.length + 1), c.n, c.decisions || 0, true);
      }
    }
  }
}

function renderFeed(items) {
  const feed = document.getElementById("feed");
  const showChan = active === "__all__";

  if (!items.length) {
    feed.innerHTML = `<div class="empty">No items in this channel yet.</div>`;
    return;
  }

  const html = items.map(it => {
    const color = TYPE_COLORS[it.type] || "var(--t-note)";
    const isDecision = it.type === "decision";
    const cls = "card" + (it.pinned ? " pinned" : "") + (isDecision ? " decision" : "");
    const pinInd = it.pinned
      ? `<span class="pin-ind${isDecision ? " decision" : ""}">📌 pinned</span>` : "";
    const chan = showChan ? `<span class="chan">${escapeHtml(it.channel)}</span>` : "";
    return `<div class="${cls}">
      <div class="meta">
        <span class="badge" style="color:${color}">${escapeHtml(it.type)}</span>
        ${chan}${pinInd}
        <span class="ts">${fmtTime(it.created)}</span>
      </div>
      <div class="body">${it.html}</div>
    </div>`;
  }).join("");

  feed.innerHTML = html;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => (
    { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]
  ));
}

async function refresh() {
  try {
    const chParam = active === "__all__" ? "" : "?channel=" + encodeURIComponent(active);
    const [chRes, itRes] = await Promise.all([
      fetch("/channels"),
      fetch("/items" + chParam),
    ]);
    if (!chRes.ok || !itRes.ok) throw new Error("bad status");
    const channels = await chRes.json();
    const items = await itRes.json();

    setConn(true);
    const sig = active + "|" + JSON.stringify(channels) + "|" + JSON.stringify(items);
    if (sig === lastSig) return;          // nothing changed — skip re-render (no flicker)
    lastSig = sig;

    renderTabs(channels);
    renderFeed(items);
  } catch (e) {
    setConn(false);
    lastSig = "";
    document.getElementById("feed").innerHTML =
      `<div class="down">⚠ Service unreachable — is <code>server.py</code> running?<br>` +
      `<span style="color:var(--fg-faint)">Start it with <code>./run.sh</code> or <code>python server.py</code>.</span></div>`;
  }
}

refresh();
setInterval(refresh, POLL_MS);
</script>
</body>
</html>
